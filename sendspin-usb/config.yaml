name: Sendspin USB Players
version: "0.9.0"
slug: sendspin-usb
description: Auto-detects USB audio devices and registers each as a Music Assistant player via sendspin.
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
host_network: true
audio: true
full_access: true
options:
  log_level: "INFO"
  static_delay_ms: 0
  audio_format: ""
schema:
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
  static_delay_ms: float
  audio_format: str
